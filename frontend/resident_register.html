<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>暗影獵人｜身分登錄</title>
    <link rel="stylesheet" href="./src/theme.css" />
  </head>
  <body data-page="register" class="higu-register-page">
    <div id="header">
      <div class="wrap s_clear">
        <h2>暗影獵人</h2>
        <div id="umenu" aria-live="polite">
          <div class="lang-switcher">
            <select class="lang-select" data-lang-select aria-label="Language selector">
              <option value="zh">ZH</option>
              <option value="en">EN</option>
              <option value="jp">JP</option>
            </select>
          </div>
        </div>
        <div id="menu">
          <ul class="menu-tabs" role="navigation" aria-label="主功能">
            <li><a class="tab" href="./lobby.html" data-i18n="common.nav.lobby">大廳</a></li>
            <li><a class="tab" href="./guide.html" data-i18n="common.nav.rules">遊戲規則</a></li>
            <li><a class="tab" href="./operation.html" data-i18n="common.nav.operation">操作說明</a></li>
            <li><a class="tab" href="./records.html" data-i18n="common.nav.records">紀錄閱覽</a></li>
            <li><a class="tab" href="./avatar.html" data-i18n="common.nav.avatars">頭像一覽</a></li>
            <li><a class="tab current" href="./resident_register.html" aria-current="page" data-i18n="common.nav.identity">身分登錄</a></li>
            <li><a class="tab" href="./version.html" data-i18n="common.nav.versions">版本紀錄</a></li>
          </ul>
        </div>
      </div>
    </div>

    <div class="wrap s_clear" id="wrap">
      <main class="main">
        <section class="panel" tabindex="0">
          <fieldset>
            <div class="card-body">
              <div class="menu-tabs identity-page-tabs" role="tablist" aria-label="身分分頁">
                <button id="identityTabBtnDirectory" class="tab current" type="button" data-tab-target="identityTabPaneDirectory" role="tab" aria-selected="true">TRIP 一覽</button>
                <button id="identityTabBtnProfile" class="tab" type="button" data-tab-target="identityTabPaneProfile" role="tab" aria-selected="false">TRIP 個人紀錄</button>
                <button id="identityTabBtnManage" class="tab" type="button" data-tab-target="identityTabPaneManage" role="tab" aria-selected="false">TRIP 管理</button>
              </div>
            </div>
          </fieldset>
        </section>

        <section id="identityTabPaneDirectory" class="panel identity-tab-pane current" tabindex="0" role="tabpanel" aria-labelledby="identityTabBtnDirectory">
          <fieldset>
            <legend><strong>TRIP 一覽</strong></legend>
            <div class="card-body identity-tools-grid">
              <div class="inline-actions">
                <input id="tripSearchInput" class="txt" type="text" placeholder="搜尋 TRIP" />
                <button id="tripSearchButton" class="btn" type="button">搜尋</button>
              </div>
              <div class="rooms-table-wrap">
                <table class="data-table" aria-label="TRIP 一覽">
                  <thead>
                    <tr>
                      <th>#</th>
                      <th>TRIP</th>
                      <th>場數</th>
                      <th>勝率</th>
                      <th id="tripDirectorySkillHeader">評級</th>
                    </tr>
                  </thead>
                  <tbody id="tripDirectoryTbody"></tbody>
                </table>
              </div>
              <div class="inline-actions">
                <button id="tripDirectoryPrevPage" class="btn" type="button">上一頁</button>
                <span id="tripDirectoryPageInfo" class="lighttxt">1 / 1</span>
                <button id="tripDirectoryNextPage" class="btn" type="button">下一頁</button>
              </div>
            </div>
          </fieldset>
        </section>

        <section id="identityTabPaneManage" class="panel identity-tab-pane" tabindex="0" role="tabpanel" aria-labelledby="identityTabBtnManage">
          <fieldset>
            <legend><strong>TRIP 管理</strong></legend>
            <div class="card-body identity-tools-grid">
              <p id="tripAuthStatus" class="identity-auth-status lighttxt"></p>

              <form id="tripRegisterForm" class="identity-inline-form">
                <strong>TRIP 登記 / 驗證</strong>
                <input id="tripRegisterTrip" class="txt" type="text" maxlength="20" placeholder="TRIP" />
                <input id="tripRegisterPassword" class="txt" type="password" maxlength="20" placeholder="密碼" />
                <button class="btn" type="submit">送出</button>
              </form>

              <form id="tripChangeForm" class="identity-inline-form">
                <strong>TRIP 更改</strong>
                <input id="tripChangeOldTrip" class="txt" type="text" maxlength="20" placeholder="舊 TRIP" />
                <input id="tripChangeOldPassword" class="txt" type="password" maxlength="20" placeholder="舊密碼" />
                <input id="tripChangeNewTrip" class="txt" type="text" maxlength="20" placeholder="新 TRIP" />
                <input id="tripChangeNewPassword" class="txt" type="password" maxlength="20" placeholder="新密碼" />
                <button class="btn" type="submit">更改</button>
              </form>

              <form id="tripClaimForm" class="identity-inline-form">
                <strong>認領紀錄</strong>
                <input id="tripClaimAccount" class="txt" type="text" maxlength="20" placeholder="舊帳號" />
                <input id="tripClaimPassword" class="txt" type="password" maxlength="20" placeholder="舊密碼" />
                <input id="tripClaimRoomId" class="txt" type="number" min="1" placeholder="房號（可選）" />
                <button class="btn" type="submit">認領</button>
              </form>

              <form id="tripModifyForm" class="identity-inline-form">
                <strong>修改紀錄</strong>
                <input id="tripModifyAccount" class="txt" type="text" maxlength="20" placeholder="舊帳號" />
                <input id="tripModifyPassword" class="txt" type="password" maxlength="20" placeholder="舊密碼" />
                <input id="tripModifyRoomId" class="txt" type="number" min="1" placeholder="房號（可選）" />
                <button class="btn" type="submit">修改</button>
              </form>

              <form id="tripDeleteForm" class="identity-inline-form">
                <strong>刪除紀錄</strong>
                <input id="tripDeleteNickname" class="txt" type="text" maxlength="20" placeholder="暱稱" />
                <input id="tripDeleteRoomId" class="txt" type="number" min="1" placeholder="房號（可選）" />
                <button class="btn" type="submit">刪除</button>
              </form>
            </div>
          </fieldset>
        </section>

        <section id="identityTabPaneProfile" class="panel identity-tab-pane" tabindex="0" role="tabpanel" aria-labelledby="identityTabBtnProfile">
          <fieldset>
            <legend><strong>TRIP 個人紀錄</strong></legend>
            <div class="card-body">
              <p id="tripProfileHint" class="lighttxt">TRIP：-</p>
              <div id="tripProfileAccounts"></div>

              <div class="menu-tabs identity-page-tabs" role="tablist" aria-label="TRIP 個人紀錄分頁">
                <button id="tripProfileTabBtnNicknames" class="tab current" type="button" data-tab-target="tripProfileNicknamesPane" role="tab" aria-selected="true">暱稱</button>
                <button id="tripProfileTabBtnGames" class="tab" type="button" data-tab-target="tripProfileGamesPane" role="tab" aria-selected="false">遊玩紀錄</button>
                <button id="tripProfileTabBtnRatings" class="tab" type="button" data-tab-target="tripProfileRatingsPane" role="tab" aria-selected="false">評價紀錄</button>
              </div>

              <div id="tripProfileNicknamesPane" class="identity-tab-pane current" role="tabpanel">
                <div class="rooms-table-wrap">
                  <table class="data-table" aria-label="TRIP 暱稱紀錄">
                    <thead>
                      <tr>
                        <th>#</th>
                        <th>暱稱</th>
                        <th>使用次數</th>
                      </tr>
                    </thead>
                    <tbody id="tripProfileNicknamesTbody"></tbody>
                  </table>
                </div>
                <div class="inline-actions">
                  <button id="tripNicknamesPrevPage" class="btn" type="button">上一頁</button>
                  <span id="tripNicknamesPageInfo" class="lighttxt">1 / 1</span>
                  <button id="tripNicknamesNextPage" class="btn" type="button">下一頁</button>
                </div>
              </div>

              <div id="tripProfileGamesPane" class="identity-tab-pane" role="tabpanel">
                <div class="rooms-table-wrap identity-trip-games-table">
                  <table class="data-table identity-trip-games-grid" aria-label="TRIP 遊玩紀錄">
                    <thead>
                      <tr>
                        <th>村號</th>
                        <th>暱稱</th>
                        <th>角色</th>
                        <th>生死</th>
                        <th>勝利</th>
                        <th>暴斃</th>
                        <th>評價</th>
                      </tr>
                    </thead>
                    <tbody id="tripProfileGamesTbody"></tbody>
                  </table>
                </div>
                <div class="inline-actions">
                  <button id="tripGamesPrevPage" class="btn" type="button">上一頁</button>
                  <span id="tripGamesPageInfo" class="lighttxt">1 / 1</span>
                  <button id="tripGamesNextPage" class="btn" type="button">下一頁</button>
                </div>
              </div>

              <div id="tripProfileRatingsPane" class="identity-tab-pane" role="tabpanel">
                <div class="rooms-table-wrap identity-ratings-table">
                  <table class="data-table" aria-label="TRIP 評價紀錄">
                    <thead>
                      <tr>
                        <th>村號</th>
                        <th>TRIP</th>
                        <th>評價</th>
                        <th>內容</th>
                      </tr>
                    </thead>
                    <tbody id="tripProfileRatingsTbody"></tbody>
                  </table>
                </div>
                <div class="inline-actions">
                  <button id="tripRatingsPrevPage" class="btn" type="button">上一頁</button>
                  <span id="tripRatingsPageInfo" class="lighttxt">1 / 1</span>
                  <button id="tripRatingsNextPage" class="btn" type="button">下一頁</button>
                </div>
              </div>
            </div>
          </fieldset>
        </section>
      </main>
    </div>

    <dialog id="skillLevelDialog" class="area-choice-dialog" aria-labelledby="skillLevelDialogTitle">
      <form method="dialog" class="area-choice-form">
        <div class="area-choice-header">
          <strong id="skillLevelDialogTitle">評級說明</strong>
        </div>
        <p id="skillLevelDialogMessage" class="area-choice-message">-</p>
        <div class="area-choice-actions">
          <button class="btn area-choice-button neutral" type="submit">關閉</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
